<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultats EduPath</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 text-center mb-4">
                    <h3>Note Prédictive</h3>
                    <h1 class="display-4 text-success">{{ prediction }}/20</h1>
                </div>
                <div class="card p-4 text-center">
                    <h3>Votre Profil</h3>
                    <h2 class="text-info">{{ cluster }}</h2>
                </div>
                <a href="/" class="btn btn-secondary mt-4 w-100">Réessayer</a>
            </div>
            <div class="col-md-8">
                <div class="card p-3">
                    <div id="chart"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var graph = {{ graph_json | safe }};
        Plotly.newPlot('chart', graph.data, graph.layout);
    </script>
</body>
</html>
